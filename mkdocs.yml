site_name: Agora User Manual
site_description: Guide for configuring and using Agora
site_url: https://newo-ether.github.io/Agora/
repo_url: https://github.com/newo-ether/Agora
repo_name: newo-ether/Agora

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - search.highlight
    - search.share

plugins:
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: zh
          name: 中文
          build: true
          nav_translations:
            Home: 首页
            Getting Started: 快速开始
            Conversations: 对话
            API Providers: API 提供商
            System Prompts: 系统提示词
            Agentic Tools: 代理工具
            Overview: 概述
            Web Search: 网络搜索
            Remote Shell (Conch): 远程 Shell (Conch)
            Knowledge Management: 知识管理
            Conversation Search: 对话搜索
            Embedding / RAG: 嵌入 / RAG
            Memory & Cache: 记忆与缓存
            Local Models: 本地模型
            PDF Import: PDF 导入
            Data Portability: 数据迁移
            FAQ: 常见问题
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Conversations: conversations.md
  - API Providers: provider.md
  - System Prompts: system-prompts.md
  - Agentic Tools:
      - Overview: tools.md
      - Web Search: web-search.md
      - Remote Shell (Conch): shell.md
  - Knowledge Management:
      - Conversation Search: search.md
      - Embedding / RAG: embedding.md
      - Memory & Cache: memory.md
  - Local Models: local-model.md
  - PDF Import: pdf-import.md
  - Data Portability: import-export.md
  - FAQ: faq.md
