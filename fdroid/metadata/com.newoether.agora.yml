Name: Agora
Summary: LLM chat client with tool calling and LAN shell execution
Description: |
  Agora connects to any OpenAI-compatible API (OpenAI, Ollama, local
  models). Supports streaming chat, tool calling with structured output,
  markdown/LaTeX/code rendering, image generation, text-to-speech, and
  encrypted shell execution over LAN via the companion Conch server.

